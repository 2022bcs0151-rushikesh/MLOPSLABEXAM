name: Docker FastAPI Smoke Test

on:
  workflow_dispatch:

jobs:
  smoke-test:
    runs-on: ubuntu-latest

    env:
      IMAGE_NAME: YOUR_DOCKERHUB_USERNAME/wine-quality-api:latest
      PORT: "8000"
      CONTAINER_NAME: wine-quality-api-${{ github.run_id }}
      STUDENT_NAME: rushikesh
      ROLL_NUMBER: 2022bcs0151

    steps:
      - name: Pull Image
        run: docker pull "$IMAGE_NAME"

      - name: Run Container
        run: |
          docker run -d --name "$CONTAINER_NAME" -p "$PORT:8000" "$IMAGE_NAME"

      - name: Wait For Readiness
        shell: bash
        run: |
          set -eu
          deadline=$((SECONDS+30))
          until [ $SECONDS -ge $deadline ]; do
            code=$(curl -s -o /dev/null -w "%{http_code}" "http://127.0.0.1:${PORT}/health" || true)
            if [ "$code" = "200" ]; then
              echo "Service is ready (HTTP 200)"
              exit 0
            fi
            echo "Not ready yet (HTTP $code). Retrying in 5s..."
            sleep 5
          done
          echo "Timed out waiting for readiness"
          exit 1

      - name: Valid Predict Request
        shell: bash
        run: |
          set -eu
          resp=$(curl -s -X POST "http://127.0.0.1:${PORT}/predict" \
            -H "Content-Type: application/json" \
            -d '{"alcohol":10}')

          echo "Response: $resp"
          echo "$resp" | grep -q 'wine_quality'
          echo "Name: ${STUDENT_NAME} | Roll: ${ROLL_NUMBER} | Output: $resp"

      - name: Invalid Predict Request
        shell: bash
        run: |
          set -eu
          code=$(curl -s -o /dev/null -w "%{http_code}" -X POST "http://127.0.0.1:${PORT}/predict" \
            -H "Content-Type: application/json" \
            -d '{"alcohol":"bad"}' || true)

          echo "Invalid request HTTP status: $code"
          if [ "$code" -lt 400 ]; then
            echo "Expected 4xx/5xx for invalid input"
            exit 1
          fi

      - name: Stop And Remove Container
        if: always()
        run: docker rm -f "$CONTAINER_NAME" || true

      - name: SUCCESS
        if: success()
        run: echo "SUCCESS"

      - name: FAILURE
        if: failure()
        run: echo "FAILURE"
